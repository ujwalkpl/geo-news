# ============================================================
# GeoNews — Local Development Stack
# Runs Postgres, Redis, Kafka, and Zookeeper locally.
# Services (API, poller, summarizer etc.) run separately.
# ============================================================

networks:
  geonews:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:

services:

  # ----------------------------------------------------------
  # PostgreSQL 15 + PostGIS
  # ----------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.4
    container_name: geonews_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geonews
      POSTGRES_USER: geonews
      POSTGRES_PASSWORD: geonews_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - geonews
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geonews -d geonews"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: geonews_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - geonews
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Zookeeper
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: geonews_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - geonews
    healthcheck:
      test: ["CMD", "bash", "-c", "cub zk-ready localhost:2181 10 2>/dev/null"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Kafka
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: geonews_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - geonews
    healthcheck:
      test: ["CMD", "bash", "-c", "cub kafka-ready -b localhost:9092 1 20 2>/dev/null"]
      interval: 15s
      timeout: 25s
      retries: 8
      start_period: 40s

  # ----------------------------------------------------------
  # Kafka topic initializer — runs once then exits
  # ----------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: geonews_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic raw-news --partitions 3 --replication-factor 1 \
        --config retention.ms=86400000

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic processed-news --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic like-events --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic failed-news --partitions 1 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic new-articles-pub --partitions 3 --replication-factor 1

      echo 'Topics created.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - geonews
