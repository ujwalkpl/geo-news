# ============================================================
# GeoNews — GitHub Actions CI/CD
#
# Trigger: manual (workflow_dispatch) only.
# To auto-deploy on push, change `on:` to:
#   on:
#     push:
#       branches: [main]
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   GCP_SA_KEY  — service account JSON key
#   GCP_PROJECT — GCP project ID (lab2-485303)
#
# GitHub Variables required (Settings → Variables → Actions):
#   GCP_REGION   — us-central1
#   GCP_REGISTRY — us-central1-docker.pkg.dev/lab2-485303/geonews
# ============================================================

name: Deploy GeoNews

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services (ignore diff)'
        type: boolean
        default: false

env:
  REGISTRY:  ${{ vars.GCP_REGISTRY }}
  REGION:    ${{ vars.GCP_REGION }}
  PROJECT:   ${{ secrets.GCP_PROJECT }}
  SA_EMAIL:  geonews-sa@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com
  SQL_INST:  ${{ secrets.GCP_PROJECT }}:us-central1:geonews-db
  VPC_CONN:  projects/${{ secrets.GCP_PROJECT }}/locations/us-central1/connectors/geonews-connector

jobs:

  # ── Detect which services changed ──────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      poller:        ${{ steps.diff.outputs.poller }}
      upload:        ${{ steps.diff.outputs.upload }}
      summarizer:    ${{ steps.diff.outputs.summarizer }}
      classifier:    ${{ steps.diff.outputs.classifier }}
      translator:    ${{ steps.diff.outputs.translator }}
      aggregator:    ${{ steps.diff.outputs.aggregator }}
      like-consumer: ${{ steps.diff.outputs.like-consumer }}
      api:           ${{ steps.diff.outputs.api }}
      websocket:     ${{ steps.diff.outputs.websocket }}
      workers:       ${{ steps.diff.outputs.workers }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute changed services
        id: diff
        run: |
          SERVICES="poller upload summarizer classifier translator aggregator like-consumer api websocket workers"

          # Force flag: deploy everything regardless of diff
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            echo "Force deploy — marking all services changed"
            for svc in $SERVICES; do echo "$svc=true" >> $GITHUB_OUTPUT; done
            exit 0
          fi

          if ! CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null) || [ -z "$CHANGED" ]; then
            echo "No diff — marking all changed"
            for svc in $SERVICES; do echo "$svc=true" >> $GITHUB_OUTPUT; done
            exit 0
          fi

          if echo "$CHANGED" | grep -q "^shared/"; then
            echo "shared/ changed — rebuilding all"
            for svc in $SERVICES; do echo "$svc=true" >> $GITHUB_OUTPUT; done
            exit 0
          fi

          for svc in $SERVICES; do
            if echo "$CHANGED" | grep -q "^services/$svc/"; then
              echo "$svc=true"  >> $GITHUB_OUTPUT
            else
              echo "$svc=false" >> $GITHUB_OUTPUT
            fi
          done

  # ── poller — fetches news from NewsAPI every 5 min via Cloud Scheduler ─────
  deploy-poller:
    name: Deploy poller
    needs: detect-changes
    if: needs.detect-changes.outputs.poller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/poller/Dockerfile \
            -t $REGISTRY/poller:${{ github.sha }} -t $REGISTRY/poller:latest .
          docker push $REGISTRY/poller:${{ github.sha }}
          docker push $REGISTRY/poller:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-poller \
            --image $REGISTRY/poller:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,NEWSAPI_KEY=NEWSAPI_KEY:latest,REDIS_URL=REDIS_URL:latest"

  # ── upload — signed URL generation + article confirm ───────────────────────
  deploy-upload:
    name: Deploy upload
    needs: detect-changes
    if: needs.detect-changes.outputs.upload == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/upload/Dockerfile \
            -t $REGISTRY/upload:${{ github.sha }} -t $REGISTRY/upload:latest .
          docker push $REGISTRY/upload:${{ github.sha }}
          docker push $REGISTRY/upload:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-upload \
            --image $REGISTRY/upload:${{ github.sha }} \
            --region $REGION --platform managed \
            --allow-unauthenticated \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET=JWT_SECRET:latest,GCS_BUCKET=GCS_BUCKET:latest,MAPBOX_TOKEN=MAPBOX_TOKEN:latest"

  # ── summarizer — Gemini Flash summarisation ─────────────────────────────────
  deploy-summarizer:
    name: Deploy summarizer
    needs: detect-changes
    if: needs.detect-changes.outputs.summarizer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/summarizer/Dockerfile \
            -t $REGISTRY/summarizer:${{ github.sha }} -t $REGISTRY/summarizer:latest .
          docker push $REGISTRY/summarizer:${{ github.sha }}
          docker push $REGISTRY/summarizer:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-summarizer \
            --image $REGISTRY/summarizer:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 --max-instances 10 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest"

  # ── classifier — spaCy NER + Mapbox geocoding ───────────────────────────────
  deploy-classifier:
    name: Deploy classifier
    needs: detect-changes
    if: needs.detect-changes.outputs.classifier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/classifier/Dockerfile \
            -t $REGISTRY/classifier:${{ github.sha }} -t $REGISTRY/classifier:latest .
          docker push $REGISTRY/classifier:${{ github.sha }}
          docker push $REGISTRY/classifier:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-classifier \
            --image $REGISTRY/classifier:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 --max-instances 10 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest,MAPBOX_TOKEN=MAPBOX_TOKEN:latest"

  # ── translator — MarianMT multilingual translation ──────────────────────────
  deploy-translator:
    name: Deploy translator
    needs: detect-changes
    if: needs.detect-changes.outputs.translator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/translator/Dockerfile \
            -t $REGISTRY/translator:${{ github.sha }} -t $REGISTRY/translator:latest .
          docker push $REGISTRY/translator:${{ github.sha }}
          docker push $REGISTRY/translator:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-translator \
            --image $REGISTRY/translator:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 --max-instances 10 \
            --memory 2Gi --cpu 2 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest"

  # ── aggregator — Redis join counter → Postgres flush → WS broadcast ─────────
  deploy-aggregator:
    name: Deploy aggregator
    needs: detect-changes
    if: needs.detect-changes.outputs.aggregator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/aggregator/Dockerfile \
            -t $REGISTRY/aggregator:${{ github.sha }} -t $REGISTRY/aggregator:latest .
          docker push $REGISTRY/aggregator:${{ github.sha }}
          docker push $REGISTRY/aggregator:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-aggregator \
            --image $REGISTRY/aggregator:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 --max-instances 5 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest,POSTGRES_URL=POSTGRES_URL:latest"

  # ── like-consumer — Kafka → Redis like/dislike counters ─────────────────────
  deploy-like-consumer:
    name: Deploy like-consumer
    needs: detect-changes
    if: needs.detect-changes.outputs.like-consumer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/like-consumer/Dockerfile \
            -t $REGISTRY/like-consumer:${{ github.sha }} -t $REGISTRY/like-consumer:latest .
          docker push $REGISTRY/like-consumer:${{ github.sha }}
          docker push $REGISTRY/like-consumer:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-like-consumer \
            --image $REGISTRY/like-consumer:${{ github.sha }} \
            --region $REGION --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 --max-instances 5 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest"

  # ── api — FastAPI REST API (public) ─────────────────────────────────────────
  deploy-api:
    name: Deploy api
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/api/Dockerfile \
            -t $REGISTRY/api:${{ github.sha }} -t $REGISTRY/api:latest .
          docker push $REGISTRY/api:${{ github.sha }}
          docker push $REGISTRY/api:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-api \
            --image $REGISTRY/api:${{ github.sha }} \
            --region $REGION --platform managed \
            --allow-unauthenticated \
            --min-instances 1 --max-instances 5 --concurrency 50 \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --set-env-vars="DB_POOL_MIN=2,DB_POOL_MAX=8" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_URL=REDIS_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,JWT_SECRET=JWT_SECRET:latest,ELASTICSEARCH_URL=ELASTICSEARCH_URL:latest"

  # ── websocket — real-time article broadcast ──────────────────────────────────
  deploy-websocket:
    name: Deploy websocket
    needs: detect-changes
    if: needs.detect-changes.outputs.websocket == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/websocket/Dockerfile \
            -t $REGISTRY/websocket:${{ github.sha }} -t $REGISTRY/websocket:latest .
          docker push $REGISTRY/websocket:${{ github.sha }}
          docker push $REGISTRY/websocket:latest
      - name: Deploy
        run: |
          gcloud run deploy geonews-websocket \
            --image $REGISTRY/websocket:${{ github.sha }} \
            --region $REGION --platform managed \
            --allow-unauthenticated \
            --min-instances 1 --max-instances 10 \
            --session-affinity \
            --service-account $SA_EMAIL \
            --vpc-connector $VPC_CONN \
            --set-secrets="KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest,REDIS_URL=REDIS_URL:latest"

  # ── workers — score, flush, heatmap, DLQ retry ──────────────────────────────
  deploy-workers:
    name: Deploy workers
    needs: detect-changes
    if: needs.detect-changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build -f services/workers/Dockerfile \
            -t $REGISTRY/workers:${{ github.sha }} -t $REGISTRY/workers:latest .
          docker push $REGISTRY/workers:${{ github.sha }}
          docker push $REGISTRY/workers:latest
      - name: Deploy score-worker
        run: |
          gcloud run deploy geonews-score-worker \
            --image $REGISTRY/workers:${{ github.sha }} \
            --region $REGION --platform managed --no-allow-unauthenticated \
            --min-instances 0 --max-instances 2 \
            --service-account $SA_EMAIL --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --command=uvicorn --args="score_worker:app,--host,0.0.0.0,--port,8080" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_URL=REDIS_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest"

      - name: Deploy flush-worker
        run: |
          gcloud run deploy geonews-flush-worker \
            --image $REGISTRY/workers:${{ github.sha }} \
            --region $REGION --platform managed --no-allow-unauthenticated \
            --min-instances 0 --max-instances 2 \
            --service-account $SA_EMAIL --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --command=uvicorn --args="flush_worker:app,--host,0.0.0.0,--port,8080" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_URL=REDIS_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest"

      - name: Deploy heatmap-worker
        run: |
          gcloud run deploy geonews-heatmap-worker \
            --image $REGISTRY/workers:${{ github.sha }} \
            --region $REGION --platform managed --no-allow-unauthenticated \
            --min-instances 0 --max-instances 2 \
            --service-account $SA_EMAIL --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --command=uvicorn --args="heatmap_worker:app,--host,0.0.0.0,--port,8080" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_URL=REDIS_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest"

      - name: Deploy dlq-retry-worker
        run: |
          gcloud run deploy geonews-dlq-retry-worker \
            --image $REGISTRY/workers:${{ github.sha }} \
            --region $REGION --platform managed --no-allow-unauthenticated \
            --min-instances 0 --max-instances 2 \
            --no-cpu-throttling \
            --service-account $SA_EMAIL --vpc-connector $VPC_CONN \
            --add-cloudsql-instances $SQL_INST \
            --command=python --args="dlq_retry_worker.py" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_URL=REDIS_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest"

  # ── frontend — Vite build → GCS static hosting ──────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.force_deploy == 'true' ||
      contains(join(github.event.commits.*.modified, ' '), 'frontend/')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build frontend/ \
            --build-arg VITE_API_URL=https://geonews-api-4loazyhcxa-uc.a.run.app \
            --build-arg VITE_WS_URL=wss://geonews-websocket-4loazyhcxa-uc.a.run.app/ws \
            --build-arg VITE_UPLOAD_URL=https://geonews-upload-4loazyhcxa-uc.a.run.app \
            --build-arg VITE_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }} \
            -t $REGISTRY/frontend:${{ github.sha }} \
            -t $REGISTRY/frontend:latest
          docker push $REGISTRY/frontend:${{ github.sha }}
          docker push $REGISTRY/frontend:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy geonews-frontend \
            --image $REGISTRY/frontend:${{ github.sha }} \
            --region $REGION --platform managed \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --service-account $SA_EMAIL
